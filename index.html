<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>F.WORK</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#080c1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="F.WORK">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #080c1a;
            --bg2:      #1a0f3d;
            --panel:    rgba(255,255,255,0.06);
            --border:   rgba(255,255,255,0.10);
            --text:     #F1F5F9;
            --sub:      #94A3B8;
            --dim:      #475569;
            --accent:   #00B0FF;
            --green:    #00E676;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bot: env(safe-area-inset-bottom, 0px);
        }
        :root[data-theme="light"] {
            --bg:    #EEF2F7;
            --bg2:   #DBEAFE;
            --panel: rgba(255,255,255,0.80);
            --border: rgba(0,0,0,0.08);
            --text:  #0F172A;
            --sub:   #475569;
            --dim:   #94A3B8;
        }

        html, body {
            width: 100%; height: 100%;
            font-family: 'Inter', 'Noto Sans KR', system-ui, sans-serif;
            background: var(--bg);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ── Star canvas ── */
        #starCanvas {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none;
            transition: opacity 0.6s;
        }
        :root[data-theme="light"] #starCanvas { opacity: 0.25; }

        /* ── BG gradient ── */
        #bgLayer {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: radial-gradient(ellipse at 35% 25%, var(--bg2) 0%, var(--bg) 65%);
            transition: background 0.5s;
        }

        /* ════════════════════════════
           SPLASH
        ════════════════════════════ */
        #splash {
            position: fixed; inset: 0; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            transition: opacity 0.65s ease;
        }
        #splash.hide { opacity: 0; pointer-events: none; }

        .spl-wrap {
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            animation: splogoIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes splogoIn {
            from { opacity: 0; transform: scale(0.45); }
            65%  { transform: scale(1.06); }
            to   { opacity: 1; transform: scale(1); }
        }

        .spl-box {
            width: 96px; height: 96px; border-radius: 18px;
            background: #000;
            border: 3.5px solid #F1F5F9;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 60px rgba(255,255,255,0.25), 0 0 120px rgba(255,255,255,0.08);
        }
        .spl-f {
            font-size: 50px; font-weight: 900;
            color: #fff;
            letter-spacing: -3px;
        }
        .spl-name {
            font-size: 34px; font-weight: 900; color: #fff;
            letter-spacing: -0.04em; text-align: center;
        }
        .spl-name-dot { color: #00B0FF; }
        .spl-tag {
            font-size: 11.5px; color: rgba(255,255,255,0.35);
            letter-spacing: 0.22em; text-transform: uppercase; text-align: center;
            margin-top: -10px;
        }

        /* ════════════════════════════
           HOME
        ════════════════════════════ */
        #home {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bot);
            opacity: 0; transform: translateY(18px);
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #home.show { opacity: 1; transform: none; pointer-events: auto; }

        /* Header */
        .h-hdr {
            display: flex; align-items: center;
            padding: 18px 20px 10px; gap: 10px;
            position: relative; z-index: 1;
        }
        .h-logo {
            width: 42px; height: 42px; border-radius: 8px;
            background: #000;
            border: 2px solid #F1F5F9;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 900; color: #F1F5F9;
            flex-shrink: 0;
        }
        .h-title {
            font-size: 21px; font-weight: 900; color: var(--text);
            letter-spacing: -0.04em; flex: 1;
        }
        .h-title-dot { color: #00B0FF; font-style: normal; }

        /* Theme toggle pill */
        .theme-pill {
            display: flex; align-items: center; gap: 6px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 5px 12px 5px 8px;
            cursor: pointer; flex-shrink: 0;
        }
        .theme-pill-track {
            width: 34px; height: 20px; border-radius: 999px;
            background: var(--dim); position: relative;
            transition: background 0.25s; flex-shrink: 0;
        }
        :root[data-theme="light"] .theme-pill-track { background: var(--accent); }
        .theme-pill-thumb {
            position: absolute; top: 2px; left: 2px;
            width: 16px; height: 16px; border-radius: 50%;
            background: #fff; transition: left 0.25s;
        }
        :root[data-theme="light"] .theme-pill-thumb { left: 16px; }
        .theme-pill-label {
            font-size: 12px; font-weight: 700; color: var(--sub);
            white-space: nowrap;
        }

        /* Body */
        .h-body {
            flex: 1; display: flex; flex-direction: column;
            justify-content: flex-start;
            padding: 24px 22px 28px;
            gap: 6px;
            overflow-y: auto;
            position: relative; z-index: 1;
        }
        .h-eyebrow {
            font-size: 11px; font-weight: 700; color: var(--dim);
            letter-spacing: 0.18em; text-transform: uppercase;
        }
        .h-heading {
            font-size: 30px; font-weight: 800; color: var(--text);
            letter-spacing: -0.6px; line-height: 1.22;
            margin-top: -2px; margin-bottom: 20px;
        }

        /* Feature card */
        .feat {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 18px 4px;
            display: flex; align-items: center; gap: 18px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.15s;
        }
        .feat:last-of-type { border-bottom: none; }
        .feat:active { opacity: 0.65; transform: scale(0.985); }
        .feat.blue { box-shadow: none; }
        .feat.green { box-shadow: none; }

        .feat-ico {
            width: 64px; height: 64px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .feat-ico svg { width: 30px; height: 30px; }
        .fi-blue  { background: linear-gradient(135deg, #0055FF, #00B0FF); }
        .fi-green { background: linear-gradient(135deg, #00A878, #00E676); }

        .feat-txt { flex: 1; min-width: 0; }
        .feat-name { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
        .feat-desc { font-size: 13px; color: var(--sub); font-weight: 500; line-height: 1.5; }
        .feat-arr  { font-size: 26px; font-weight: 200; color: var(--dim); flex-shrink: 0; }

        /* ════════════════════════════
           SUB-MENU
        ════════════════════════════ */
        #sub {
            position: fixed; inset: 0; z-index: 50;
            display: flex; flex-direction: column;
            background: radial-gradient(ellipse at 30% 20%, var(--bg2) 0%, var(--bg) 65%);
            transform: translateX(100%);
            transition: transform 0.36s cubic-bezier(0.16, 1, 0.3, 1);
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bot);
            pointer-events: none;
        }
        #sub.open { transform: translateX(0); pointer-events: auto; }

        .sub-hdr {
            display: flex; align-items: center;
            padding: 16px 20px; gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        .sub-back {
            width: 40px; height: 40px; border-radius: 13px;
            background: var(--panel); border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--sub);
            transition: background 0.15s;
        }
        .sub-back:active { background: var(--border); }
        .sub-back svg { width: 20px; height: 20px; stroke: var(--sub); }

        .sub-cat {
            display: flex; align-items: center; gap: 10px; flex: 1;
        }
        .sub-cat-ico {
            width: 34px; height: 34px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .sub-cat-ico svg { width: 16px; height: 16px; }
        .sub-title { font-size: 19px; font-weight: 700; color: var(--text); }

        .sub-body {
            flex: 1; padding: 22px 20px;
            display: flex; flex-direction: column; gap: 11px;
            overflow-y: auto;
        }
        .sub-section {
            font-size: 10.5px; font-weight: 700; color: var(--dim);
            letter-spacing: 0.15em; text-transform: uppercase;
            padding: 0 2px 2px;
        }

        /* Menu item */
        .mitem {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 17px 17px;
            display: flex; align-items: center; gap: 14px;
            cursor: pointer;
            transition: transform 0.15s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .mitem:active { transform: scale(0.978); }

        .mi-ico {
            width: 50px; height: 50px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .mi-ico svg { width: 23px; height: 23px; }
        .mi-dash  { background: rgba(0,176,255,0.14); }
        .mi-sheet { background: rgba(52,211,153,0.14); }
        .mi-scan  { background: rgba(168,85,247,0.14); }

        .mi-txt { flex: 1; }
        .mi-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .mi-desc  { font-size: 12px; color: var(--sub); line-height: 1.45; }
        .mi-arr   { font-size: 20px; font-weight: 200; color: var(--dim); }

        /* ── Sheet factory modal ── */
        #sheetModal {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.55);
            display: flex; align-items: flex-end;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s;
        }
        #sheetModal.open { opacity: 1; pointer-events: auto; }
        .modal-sheet {
            width: 100%; background: #1E293B;
            border-radius: 24px 24px 0 0;
            padding: 0 0 calc(20px + var(--safe-bot));
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        :root[data-theme="light"] .modal-sheet { background: #fff; }
        #sheetModal.open .modal-sheet { transform: translateY(0); }
        .modal-handle {
            width: 40px; height: 4px; border-radius: 2px;
            background: var(--dim); margin: 12px auto 20px;
        }
        .modal-title {
            font-size: 16px; font-weight: 700; color: var(--text);
            padding: 0 20px 14px; border-bottom: 1px solid var(--border);
        }
        .factory-btn {
            display: flex; align-items: center; gap: 14px;
            padding: 18px 20px; cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .factory-btn:last-child { border-bottom: none; }
        .factory-btn:active { background: var(--panel); }
        .factory-dot {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
        }
        .factory-name { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
        .factory-arr  { font-size: 18px; color: var(--dim); }

        /* ── Page transition ── */
        #pageVeil {
            position: fixed; inset: 0; z-index: 500;
            background: var(--bg);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        #pageVeil.show { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div id="bgLayer"></div>
<div id="pageVeil"></div>

<script>
/* ── Star canvas ── */
(function(){
    var cv = document.getElementById('starCanvas');
    var cx = cv.getContext('2d');
    var stars;
    function resize(){
        cv.width = innerWidth; cv.height = innerHeight;
        stars = Array.from({length:150}, function(){
            return { x: Math.random()*cv.width, y: Math.random()*cv.height,
                     r: Math.random()*1.3+0.15, a: Math.random()*0.75+0.1 };
        });
        draw();
    }
    function draw(){
        cx.clearRect(0,0,cv.width,cv.height);
        stars.forEach(function(s){
            cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2);
            cx.fillStyle='rgba(255,255,255,'+s.a+')'; cx.fill();
        });
    }
    resize();
    window.addEventListener('resize', resize);
})();

/* ── Theme ── */
var _theme = localStorage.getItem('fwork_theme') || 'dark';
document.documentElement.setAttribute('data-theme', _theme);
_applyThemeLabel();

function toggleTheme(){
    _theme = _theme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', _theme);
    localStorage.setItem('fwork_theme', _theme);
    _applyThemeLabel();
}
function _applyThemeLabel(){
    var el = document.getElementById('themeLabel');
    if(el) el.textContent = _theme === 'light' ? '라이트' : '다크';
}

/* bfcache 복원 시 전체 상태 초기화 (브라우저 뒤로가기 버그 방지) */
window.addEventListener('pageshow', function(e){
    if(e.persisted){
        var veil = document.getElementById('pageVeil');
        veil.classList.remove('show');
        veil.style.opacity = '0';
        veil.style.pointerEvents = 'none';
        var sub = document.getElementById('sub');
        sub.classList.remove('open');
        sub.style.pointerEvents = 'none';
        document.getElementById('home').classList.add('show');
    }
});

/* ── Splash ── */
(function(){
    var splash = document.getElementById('splash');
    var home   = document.getElementById('home');
    var skip   = sessionStorage.getItem('fwork_splash');

    if(skip){
        splash.style.display = 'none';
        home.classList.add('show');
        _restoreSub();
        return;
    }
    sessionStorage.setItem('fwork_splash','1');
    setTimeout(function(){
        splash.classList.add('hide');
        setTimeout(function(){
            splash.style.display = 'none';
            home.classList.add('show');
            _restoreSub();
        }, 650);
    }, 2300);
})();

/* ── Sub-menu ── */
var _curMenu = 'pack';
var MENUS = {
    pack: {
        title: '포장강화',

function openSub(type){
    _curMenu = type;
    var m = MENUS[type];
    document.getElementById('subTitle').textContent = m.title;
    var ico = document.getElementById('subIco');
    ico.innerHTML = m.icoSvg;
    ico.style.background = m.icoBg;
    document.getElementById('sub').classList.add('open');
}

function closeSub(){
    var sub = document.getElementById('sub');
    sub.classList.remove('open');
    sub.style.pointerEvents = 'none';
}

function _restoreSub(){
    var from = sessionStorage.getItem('fwork_from');
    if(from && MENUS[from]){
        sessionStorage.removeItem('fwork_from');
        setTimeout(function(){ openSub(from); }, 350);
    }
}

function _navigate(url){
    var veil = document.getElementById('pageVeil');
    sessionStorage.setItem('fwork_from', _curMenu);
    veil.classList.add('show');
    setTimeout(function(){ window.location.href = url; }, 280);
}

function goDashboard(){
    var m = MENUS[_curMenu];
    var th = document.documentElement.getAttribute('data-theme') || 'dark';
    _navigate(m.dashboard + '?shell=1&theme=' + th);
}

function goSheets(){
    var m = MENUS[_curMenu];
    if(!m.sheets){ alert('링크가 설정되지 않았습니다.'); return; }
    if(typeof m.sheets === 'string'){
        window.open(m.sheets, '_blank');
    } else {
        /* 품질검사: 공장 선택 모달 */
        document.getElementById('sheetModal').classList.add('open');
    }
}
function closeSheetModal(){
    document.getElementById('sheetModal').classList.remove('open');
}
function openFactory(key){
    var url = MENUS.quality.sheets[key];
    closeSheetModal();
    window.open(url, '_blank');
}

function goScan(){
    alert('바코드 스캐너 기능은 준비 중입니다.');
}
</script>
