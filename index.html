<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>F.WORK</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#080c1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="F.WORK">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #080c1a;
            --bg2:      #1a0f3d;
            --panel:    rgba(255,255,255,0.06);
            --border:   rgba(255,255,255,0.10);
            --text:     #F1F5F9;
            --sub:      #94A3B8;
            --dim:      #475569;
            --accent:   #00B0FF;
            --green:    #00E676;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bot: env(safe-area-inset-bottom, 0px);
        }
        :root[data-theme="light"] {
            --bg:    #EEF2F7;
            --bg2:   #DBEAFE;
            --panel: rgba(255,255,255,0.80);
            --border: rgba(0,0,0,0.08);
            --text:  #0F172A;
            --sub:   #475569;
            --dim:   #94A3B8;
        }

        html, body {
            width: 100%; height: 100%;
            font-family: 'Inter', 'Noto Sans KR', system-ui, sans-serif;
            background: var(--bg);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ── Star canvas ── */
        #starCanvas {
            position: fixed; inset: 0; z-index: 0;
            pointer-events: none;
            transition: opacity 0.6s;
        }
        :root[data-theme="light"] #starCanvas { opacity: 0.25; }

        /* ── BG gradient ── */
        #bgLayer {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: radial-gradient(ellipse at 35% 25%, var(--bg2) 0%, var(--bg) 65%);
            transition: background 0.5s;
        }

        /* ════════════════════════════
           SPLASH
        ════════════════════════════ */
        #splash {
            position: fixed; inset: 0; z-index: 300;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            transition: opacity 0.65s ease;
        }
        #splash.hide { opacity: 0; pointer-events: none; }

        .spl-wrap {
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            animation: splogoIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes splogoIn {
            from { opacity: 0; transform: scale(0.45); }
            65%  { transform: scale(1.06); }
            to   { opacity: 1; transform: scale(1); }
        }

        .spl-box {
            width: 96px; height: 96px; border-radius: 18px;
            background: #000;
            border: 3.5px solid #F1F5F9;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 60px rgba(255,255,255,0.25), 0 0 120px rgba(255,255,255,0.08);
        }
        .spl-f {
            font-size: 50px; font-weight: 900;
            color: #fff;
            letter-spacing: -3px;
        }
        .spl-name {
            font-size: 34px; font-weight: 900; color: #fff;
            letter-spacing: -0.04em; text-align: center;
        }
        .spl-name-dot { color: #00B0FF; }
        .spl-tag {
            font-size: 11.5px; color: rgba(255,255,255,0.35);
            letter-spacing: 0.22em; text-transform: uppercase; text-align: center;
            margin-top: -10px;
        }

        /* ════════════════════════════
           HOME
        ════════════════════════════ */
        #home {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column;
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bot);
            opacity: 0; transform: translateY(18px);
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #home.show { opacity: 1; transform: none; pointer-events: auto; }

        /* Header */
        .h-hdr {
            display: flex; align-items: center;
            padding: 22px 22px 14px; gap: 12px;
            position: relative; z-index: 1;
        }
        .h-logo {
            width: 52px; height: 52px; border-radius: 10px;
            background: #000;
            border: 2px solid #F1F5F9;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; font-weight: 900; color: #F1F5F9;
            flex-shrink: 0;
        }
        .h-title {
            font-size: 26px; font-weight: 900; color: var(--text);
            letter-spacing: -0.04em; flex: 1;
        }
        .h-title-dot { color: #00B0FF; font-style: normal; }

        /* Theme toggle pill */
        .theme-pill {
            display: flex; align-items: center; gap: 6px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 5px 12px 5px 8px;
            cursor: pointer; flex-shrink: 0;
        }
        .theme-pill-track {
            width: 34px; height: 20px; border-radius: 999px;
            background: var(--dim); position: relative;
            transition: background 0.25s; flex-shrink: 0;
        }
        :root[data-theme="light"] .theme-pill-track { background: var(--accent); }
        .theme-pill-thumb {
            position: absolute; top: 2px; left: 2px;
            width: 16px; height: 16px; border-radius: 50%;
            background: #fff; transition: left 0.25s;
        }
        :root[data-theme="light"] .theme-pill-thumb { left: 16px; }
        .theme-pill-label {
            font-size: 12px; font-weight: 700; color: var(--sub);
            white-space: nowrap;
        }

        /* Body */
        .h-body {
            flex: 1; display: flex; flex-direction: column;
            justify-content: flex-start;
            padding: 24px 22px 28px;
            gap: 6px;
            overflow-y: auto;
            position: relative; z-index: 1;
        }
        .h-eyebrow {
            font-size: 11px; font-weight: 700; color: var(--dim);
            letter-spacing: 0.18em; text-transform: uppercase;
        }
        .h-heading {
            font-size: 30px; font-weight: 800; color: var(--text);
            letter-spacing: -0.6px; line-height: 1.22;
            margin-top: -2px; margin-bottom: 20px;
        }

        /* Feature card */
        .feat {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 34px 4px;
            display: flex; align-items: center; gap: 24px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.15s;
        }
        .feat:last-of-type { border-bottom: none; }
        .feat:active { opacity: 0.65; transform: scale(0.985); }
        .feat.blue { box-shadow: none; }
        .feat.green { box-shadow: none; }

        .feat-ico {
            width: 90px; height: 90px; border-radius: 26px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .feat-ico svg { width: 42px; height: 42px; }
        .fi-blue  { background: linear-gradient(135deg, #0055FF, #00B0FF); }
        .fi-green { background: linear-gradient(135deg, #00A878, #00E676); }

        .feat-txt { flex: 1; min-width: 0; }
        .feat-name { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 9px; }
        .feat-desc { font-size: 17px; color: var(--sub); font-weight: 500; line-height: 1.55; }
        .feat-arr  { font-size: 36px; font-weight: 200; color: var(--dim); flex-shrink: 0; }

        /* ════════════════════════════
           SUB-MENU
        ════════════════════════════ */
        #sub {
            position: fixed; inset: 0; z-index: 50;
            display: flex; flex-direction: column;
            background: radial-gradient(ellipse at 30% 20%, var(--bg2) 0%, var(--bg) 65%);
            transform: translateX(100%);
            transition: transform 0.36s cubic-bezier(0.16, 1, 0.3, 1);
            padding-top: var(--safe-top);
            padding-bottom: var(--safe-bot);
            pointer-events: none;
        }
        #sub.open { transform: translateX(0); pointer-events: auto; }

        .sub-hdr {
            display: flex; align-items: center;
            padding: 22px 22px; gap: 16px;
            border-bottom: 1px solid var(--border);
        }
        .sub-back {
            width: 58px; height: 58px; border-radius: 18px;
            background: var(--panel); border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--sub);
            transition: background 0.15s;
        }
        .sub-back:active { background: var(--border); }
        .sub-back svg { width: 28px; height: 28px; stroke: var(--sub); }

        .sub-cat {
            display: flex; align-items: center; gap: 14px; flex: 1;
        }
        .sub-cat-ico {
            width: 46px; height: 46px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
        }
        .sub-cat-ico svg { width: 22px; height: 22px; }
        .sub-title { font-size: 26px; font-weight: 700; color: var(--text); }

        .sub-body {
            flex: 1; padding: 24px 22px 36px;
            display: flex; flex-direction: column; gap: 0;
            overflow-y: auto;
        }
        .sub-section {
            font-size: 13px; font-weight: 700; color: var(--dim);
            letter-spacing: 0.15em; text-transform: uppercase;
            padding: 0 2px 18px;
        }

        /* Menu item — 투명, 구분선만 */
        .mitem {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            border-radius: 0;
            padding: 36px 4px;
            display: flex; align-items: center; gap: 24px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.15s;
        }
        .mitem:last-child { border-bottom: none; }
        .mitem:active { opacity: 0.65; transform: scale(0.985); }

        .mi-ico {
            width: 90px; height: 90px; border-radius: 26px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .mi-ico svg { width: 40px; height: 40px; }
        .mi-dash  { background: rgba(0,176,255,0.14); }
        .mi-sheet { background: rgba(52,211,153,0.14); }
        .mi-scan  { background: rgba(168,85,247,0.14); }

        .mi-txt { flex: 1; }
        .mi-title { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
        .mi-desc  { font-size: 18px; color: var(--sub); line-height: 1.5; }
        .mi-arr   { font-size: 36px; font-weight: 200; color: var(--dim); flex-shrink: 0; }

        /* ── Sheet factory modal ── */
        #sheetModal {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.55);
            display: flex; align-items: flex-end;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s;
        }
        #sheetModal.open { opacity: 1; pointer-events: auto; }
        .modal-sheet {
            width: 100%; background: #1E293B;
            border-radius: 24px 24px 0 0;
            padding: 0 0 calc(20px + var(--safe-bot));
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        :root[data-theme="light"] .modal-sheet { background: #fff; }
        #sheetModal.open .modal-sheet { transform: translateY(0); }
        .modal-handle {
            width: 40px; height: 4px; border-radius: 2px;
            background: var(--dim); margin: 12px auto 20px;
        }
        .modal-title {
            font-size: 16px; font-weight: 700; color: var(--text);
            padding: 0 20px 14px; border-bottom: 1px solid var(--border);
        }
        .factory-btn {
            display: flex; align-items: center; gap: 14px;
            padding: 18px 20px; cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .factory-btn:last-child { border-bottom: none; }
        .factory-btn:active { background: var(--panel); }
        .factory-dot {
            width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
        }
        .factory-name { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
        .factory-arr  { font-size: 18px; color: var(--dim); }

        /* ── Page transition ── */
        #pageVeil {
            position: fixed; inset: 0; z-index: 500;
            background: var(--bg);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        #pageVeil.show { opacity: 1; pointer-events: auto; }

        /* ── Scanner Modal ── */
        #scanModal {
            position: fixed; inset: 0; z-index: 210;
            background: rgba(0,0,0,0.82);
            display: flex; align-items: flex-end;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s;
        }
        #scanModal.open { opacity: 1; pointer-events: auto; }
        .scan-box {
            width: 100%; background: #0D1117;
            border-radius: 24px 24px 0 0; overflow: hidden;
            height: 88vh; max-height: 88vh; display: flex; flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.32s cubic-bezier(0.16,1,0.3,1);
        }
        #scanModal.open .scan-box { transform: translateY(0); }
        .scan-hdr {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px; flex-shrink: 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .scan-ttl { font-size: 17px; font-weight: 700; color: #F1F5F9; }
        .scan-close {
            width: 36px; height: 36px; border-radius: 10px;
            background: rgba(255,255,255,0.08); border: none;
            display: flex; align-items: center; justify-content: center;
            color: #94A3B8; cursor: pointer;
        }
        .scan-view {
            position: relative; background: #000;
            width: 100%; flex: 1; min-height: 0; overflow: hidden;
        }
        #scanVideo { width: 100%; height: 100%; display: block; object-fit: cover; }
        #scanOverlay { position: absolute; inset: 0; pointer-events: none; }
        .scan-foot {
            padding: 16px 20px; padding-bottom: calc(16px + env(safe-area-inset-bottom));
            display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
        }
        .scan-status { font-size: 13px; color: #64748B; text-align: center; margin: 0; }
        .scan-result-area {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 14px 16px;
            flex-direction: column; gap: 10px;
        }
        .scan-fmt { font-size: 10px; font-weight: 700; color: #00B0FF; letter-spacing:.1em; text-transform:uppercase; margin-bottom:3px; }
        .scan-val { font-size: 17px; font-weight: 700; color: #F1F5F9; font-family:'Courier New',monospace; word-break:break-all; }
        .scan-actions { display: flex; gap: 8px; }
        .scan-btn {
            flex: 1; padding: 10px 8px; border-radius: 10px;
            background: rgba(0,176,255,0.12); border: 1px solid rgba(0,176,255,0.25);
            font-size: 13px; font-weight: 700; color: #00B0FF; cursor: pointer;
        }
        .scan-btn-primary {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #0055FF 0%, #00B0FF 100%);
            border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700; color: #fff;
            cursor: pointer; letter-spacing: -0.02em;
        }
        .scan-capture-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #0055FF 0%, #00B0FF 100%);
            border: none; border-radius: 14px;
            font-size: 16px; font-weight: 700; color: #fff;
            cursor: pointer; letter-spacing: -0.02em;
            transition: opacity 0.2s;
        }
        .scan-capture-btn:disabled { opacity: 0.45; }
        .scan-result-label {
            font-size: 11px; font-weight: 700; color: #64748B;
            letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px;
        }
        .scan-codes-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .scan-code-chip {
            background: rgba(0,176,255,0.10);
            border: 1px solid rgba(0,176,255,0.28);
            border-radius: 10px; padding: 10px 14px;
            font-size: 14px; font-weight: 700; color: #F1F5F9;
            font-family: 'Courier New', monospace;
            cursor: pointer; transition: background 0.15s;
        }
        .scan-code-chip.selected {
            background: rgba(0,176,255,0.24);
            border-color: #00B0FF; color: #00B0FF;
        }
        .scan-selected-area {
            margin-top: 10px; display: flex; flex-direction: column; gap: 8px;
        }
    </style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div id="bgLayer"></div>
<div id="pageVeil"></div>

<!-- ══ Barcode Scanner ══ -->
<div id="scanModal" onclick="if(event.target===this)closeScan()">
    <div class="scan-box">
        <div class="scan-hdr">
            <span class="scan-ttl">코드 검색</span>
            <button class="scan-close" onclick="closeScan()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="scan-view">
            <video id="scanVideo" autoplay playsinline muted></video>
            <canvas id="scanOverlay"></canvas>
        </div>
        <div class="scan-foot">
            <p id="scanStatus" class="scan-status">카메라 준비 중...</p>
            <button id="scanCaptureBtn" class="scan-capture-btn" onclick="captureAndDecode()" style="display:none;">캡처 &amp; 인식</button>
            <div id="scanResultArea" class="scan-result-area" style="display:none;">
                <div class="scan-result-label">인식된 코드</div>
                <div id="scanResultCodes" class="scan-codes-list"></div>
                <div id="scanSelectedArea" class="scan-selected-area" style="display:none;">
                    <div id="scanSelectedVal" class="scan-val"></div>
                    <button class="scan-btn-primary" onclick="viewInDashboard()">대시보드에서 보기</button>
                    <div class="scan-actions">
                        <button class="scan-btn" id="scanCopyBtn" onclick="copySelectedCode()">복사</button>
                        <button class="scan-btn" onclick="rescan()">다시 스캔</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ══ Sheet 공장 선택 모달 ══ -->
<div id="sheetModal" onclick="if(event.target===this)closeSheetModal()">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-title">공장 선택</div>
        <div class="factory-btn" onclick="openFactory('cj1')">
            <div class="factory-dot" style="background:#00B0FF;"></div>
            <span class="factory-name">충주 1공장</span>
            <span class="factory-arr">›</span>
        </div>
        <div class="factory-btn" onclick="openFactory('cj2')">
            <div class="factory-dot" style="background:#00E676;"></div>
            <span class="factory-name">충주 2공장</span>
            <span class="factory-arr">›</span>
        </div>
    </div>
</div>

<!-- ══════════════ SPLASH ══════════════ -->
<div id="splash">
    <div class="spl-wrap">
        <div class="spl-box"><span class="spl-f">F</span></div>
        <div>
            <div class="spl-name">F<em class="spl-name-dot">.</em>WORK</div>
            <div class="spl-tag">FURSYS Dashboard</div>
        </div>
    </div>
</div>

<!-- ══════════════ HOME ══════════════ -->
<div id="home">
    <div class="h-hdr">
        <div class="h-logo">F</div>
        <span class="h-title">F<em class="h-title-dot">.</em>WORK</span>
        <div class="theme-pill" onclick="toggleTheme()" title="라이트/다크">
            <div class="theme-pill-track"><div class="theme-pill-thumb"></div></div>
            <span class="theme-pill-label" id="themeLabel">다크</span>
        </div>
    </div>

    <div class="h-body">
        <div>
            <div class="h-eyebrow">FURSYS · WORK</div>
            <div class="h-heading">무엇을<br>확인할까요?</div>
        </div>

        <!-- 포장강화 -->
        <div class="feat blue" onclick="openSub('pack')" role="button">
            <div class="feat-ico fi-blue">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
                    <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                    <line x1="12" y1="22.08" x2="12" y2="12"/>
                </svg>
            </div>
            <div class="feat-txt">
                <div class="feat-name">포장강화</div>
                <div class="feat-desc">수출포장 강화 현황 관리<br>파렛트 · 작업계획 · 출고 현황</div>
            </div>
            <div class="feat-arr">›</div>
        </div>

        <!-- 품질검사 -->
        <div class="feat green" onclick="openSub('quality')" role="button">
            <div class="feat-ico fi-green">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 11l3 3L22 4"/>
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                </svg>
            </div>
            <div class="feat-txt">
                <div class="feat-name">품질검사</div>
                <div class="feat-desc">수출건 품질검사 현황 관리<br>공장별 검사 · 누적 통계</div>
            </div>
            <div class="feat-arr">›</div>
        </div>
    </div>
</div>

<!-- ══════════════ SUB-MENU ══════════════ -->
<div id="sub">
    <div class="sub-hdr">
        <button class="sub-back" onclick="closeSub()">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

<script>
/* ── Star canvas ── */
(function(){
    var cv = document.getElementById('starCanvas');
    var cx = cv.getContext('2d');
    var stars;
    function resize(){
        cv.width = innerWidth; cv.height = innerHeight;
        stars = Array.from({length:150}, function(){
            return { x: Math.random()*cv.width, y: Math.random()*cv.height,
                     r: Math.random()*1.3+0.15, a: Math.random()*0.75+0.1 };
        });
        draw();
    }
    function draw(){
        cx.clearRect(0,0,cv.width,cv.height);
        stars.forEach(function(s){
            cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2);
            cx.fillStyle='rgba(255,255,255,'+s.a+')'; cx.fill();
        });
    }
    resize();
    window.addEventListener('resize', resize);
})();

/* ── Theme ── */
var _theme = localStorage.getItem('fwork_theme') || 'dark';
document.documentElement.setAttribute('data-theme', _theme);
_applyThemeLabel();

function toggleTheme(){
    _theme = _theme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', _theme);
    localStorage.setItem('fwork_theme', _theme);
    _applyThemeLabel();
}
function _applyThemeLabel(){
    var el = document.getElementById('themeLabel');
    if(el) el.textContent = _theme === 'light' ? '라이트' : '다크';
}

/* bfcache 복원 시 전체 상태 초기화 (브라우저 뒤로가기 버그 방지) */
window.addEventListener('pageshow', function(e){
    if(e.persisted){
        var veil = document.getElementById('pageVeil');
        veil.classList.remove('show');
        var sub = document.getElementById('sub');
        sub.classList.remove('open');
        sub.style.pointerEvents = '';   /* 인라인 초기화 — CSS가 제어 */
        document.getElementById('home').classList.add('show');
    }
});

/* ── Splash ── */
(function(){
    var splash = document.getElementById('splash');
    var home   = document.getElementById('home');
    var skip   = sessionStorage.getItem('fwork_splash');

    if(skip){
        splash.style.display = 'none';
        home.classList.add('show');
        return;
    }
    sessionStorage.setItem('fwork_splash','1');
    setTimeout(function(){
        splash.classList.add('hide');
        setTimeout(function(){
            splash.style.display = 'none';
            home.classList.add('show');
        }, 650);
    }, 2300);
})();

/* ── Sub-menu ── */
var _curMenu = 'pack';
var MENUS = {
    pack: {
        title: '포장강화',
        dashboard: '수출포장강화_대시보드.html',
        sheets: 'https://docs.google.com/spreadsheets/d/1Utm_IuDQkguqvX8-zhfVtfMMQVb_n7SOJ3A7_fVPx54/edit?gid=652822887#gid=652822887',
        icoBg: 'linear-gradient(135deg,#0055FF,#00B0FF)',
        icoSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>'
    },
    quality: {
        title: '품질검사',
        dashboard: '수출검사리스트_대시보드.html',
        sheets: {
            cj1: 'https://docs.google.com/spreadsheets/d/1Utm_IuDQkguqvX8-zhfVtfMMQVb_n7SOJ3A7_fVPx54/edit?gid=652822887#gid=652822887',
            cj2: 'https://docs.google.com/spreadsheets/d/1Gy1jIbw7j4t2A2B0N3-cwrqwCQMXd1M-S4oROGk-hg8/edit?gid=1962376452#gid=1962376452'
        },
        icoBg: 'linear-gradient(135deg,#00A878,#00E676)',
        icoSvg: '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>'
    }
};

function openSub(type){
    _curMenu = type;
    var m = MENUS[type];
    document.getElementById('subTitle').textContent = m.title;
    var ico = document.getElementById('subIco');
    ico.innerHTML = m.icoSvg;
    ico.style.background = m.icoBg;
    var sub = document.getElementById('sub');
    sub.style.pointerEvents = '';   /* 인라인 스타일 초기화 — CSS 클래스가 제어 */
    sub.classList.add('open');
}

function closeSub(){
    document.getElementById('sub').classList.remove('open');
    /* pointer-events는 CSS #sub { pointer-events: none } 이 담당 — 인라인 미설정 */
}

function _navigate(url){
    var veil = document.getElementById('pageVeil');
    veil.classList.add('show');
    setTimeout(function(){ window.location.href = url; }, 280);
}

function goDashboard(){
    var m = MENUS[_curMenu];
    var th = document.documentElement.getAttribute('data-theme') || 'dark';
    _navigate(m.dashboard + '?shell=1&theme=' + th);
}

function goSheets(){
    var m = MENUS[_curMenu];
    if(!m.sheets){ alert('링크가 설정되지 않았습니다.'); return; }
    if(typeof m.sheets === 'string'){
        window.open(m.sheets, '_blank');
    } else {
        /* 품질검사: 공장 선택 모달 */
        document.getElementById('sheetModal').classList.add('open');
    }
}
function closeSheetModal(){
    document.getElementById('sheetModal').classList.remove('open');
}
function openFactory(key){
    var url = MENUS.quality.sheets[key];
    closeSheetModal();
    window.open(url, '_blank');
}

/* ── Barcode Scanner ── */
var _scanStream    = null;
var _scanTimer     = null;
var _barcodeDetect = null;
var _selectedCode  = '';
var _isDecoding    = false;

function goScan(){
    var hasTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    if(!hasTouch){ alert('모바일 기기에서만 사용 가능합니다.'); return; }
    document.getElementById('scanModal').classList.add('open');
    _startScan();
}

function _startScan(){
    var status = document.getElementById('scanStatus');
    status.textContent = '카메라 초기화 중...';
    document.getElementById('scanResultArea').style.display = 'none';
    document.getElementById('scanSelectedArea').style.display = 'none';
    document.getElementById('scanCaptureBtn').style.display = 'none';
    _isDecoding = false;

    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
        status.textContent = '카메라를 지원하지 않는 브라우저입니다.';
        return;
    }
    navigator.mediaDevices.getUserMedia({
        video: { facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080} }
    }).then(function(stream){
        _scanStream = stream;
        var v = document.getElementById('scanVideo');
        v.srcObject = stream;
        v.play();
        if('BarcodeDetector' in window){
            try {
                _barcodeDetect = new BarcodeDetector({
                    formats: ['code_128','code_39','ean_13','ean_8','upc_a','upc_e','itf','codabar','qr_code','data_matrix','aztec','pdf_417']
                });
            } catch(e) {
                _barcodeDetect = new BarcodeDetector();
            }
            status.textContent = '바코드를 프레임에 비춰주세요 (자동 인식 중)';
            setTimeout(function(){ if(_scanStream && _barcodeDetect) _loopBarcode(v); }, 600);
        } else {
            status.textContent = '바코드에 카메라를 맞추고 캡처 버튼을 누르세요';
            document.getElementById('scanCaptureBtn').style.display = 'block';
        }
    }).catch(function(err){
        status.textContent = '카메라 권한이 필요합니다 (' + (err.name || err) + ')';
    });
}

function _loopBarcode(video){
    if(!_scanStream || !_barcodeDetect) return;
    _barcodeDetect.detect(video).then(function(results){
        var codes = [];
        var bestCorners = null;
        results.forEach(function(r){
            var parsed = _parseBarcode(r.rawValue);
            if(parsed && parsed.length >= 4 && /[A-Z]/.test(parsed) && codes.indexOf(parsed) < 0){
                codes.push(parsed);
                if(!bestCorners && r.cornerPoints) bestCorners = r.cornerPoints;
            }
        });
        if(codes.length > 0){
            if(bestCorners) _drawBarcodeBox(bestCorners, video);
            if(navigator.vibrate) navigator.vibrate(60);
            document.getElementById('scanStatus').textContent = '바코드 인식 완료!';
            setTimeout(function(){
                _clearOverlay();
                _onCodesFound(codes);
            }, 700);
        } else {
            _clearOverlay();
            _scanTimer = setTimeout(function(){ _loopBarcode(video); }, 300);
        }
    }).catch(function(){
        _clearOverlay();
        _scanTimer = setTimeout(function(){ _loopBarcode(video); }, 600);
    });
}

function _drawBarcodeBox(cornerPoints, video){
    var canvas = document.getElementById('scanOverlay');
    if(!canvas || !cornerPoints || cornerPoints.length < 3) return;
    var ctx = canvas.getContext('2d');

    var rect = canvas.getBoundingClientRect();
    canvas.width  = rect.width  || canvas.offsetWidth;
    canvas.height = rect.height || canvas.offsetHeight;

    var vW = video.videoWidth  || 1;
    var vH = video.videoHeight || 1;
    var cW = canvas.width;
    var cH = canvas.height;

    /* object-fit:cover 좌표 변환 */
    var scale = Math.max(cW / vW, cH / vH);
    var offX  = (cW - vW * scale) / 2;
    var offY  = (cH - vH * scale) / 2;
    function mx(x){ return x * scale + offX; }
    function my(y){ return y * scale + offY; }

    ctx.clearRect(0, 0, cW, cH);
    ctx.beginPath();
    ctx.moveTo(mx(cornerPoints[0].x), my(cornerPoints[0].y));
    for(var i = 1; i < cornerPoints.length; i++){
        ctx.lineTo(mx(cornerPoints[i].x), my(cornerPoints[i].y));
    }
    ctx.closePath();

    ctx.fillStyle   = 'rgba(0,255,136,0.18)';
    ctx.fill();
    ctx.strokeStyle = '#00FF88';
    ctx.lineWidth   = 4;
    ctx.shadowColor = '#00FF88';
    ctx.shadowBlur  = 14;
    ctx.stroke();
    ctx.shadowBlur  = 0;
}

function _clearOverlay(){
    var canvas = document.getElementById('scanOverlay');
    if(!canvas) return;
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function _parseBarcode(raw){
    raw = (raw || '').trim();
    /* 로트번호 괄호 제거: FABX2402001(C26724) → FABX2402001 */
    raw = raw.replace(/\s*\([^)]*\)\s*/g, '').trim();
    return raw;
}

function captureAndDecode(){
    if(_isDecoding) return;
    _isDecoding = true;
    var status = document.getElementById('scanStatus');
    var btn = document.getElementById('scanCaptureBtn');
    status.textContent = '인식 중... 잠시 기다려주세요';
    btn.disabled = true;

    var video = document.getElementById('scanVideo');
    var canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || 1280;
    canvas.height = video.videoHeight || 720;
    canvas.getContext('2d').drawImage(video, 0, 0);

    _loadZXing(function(){
        try {
            var reader = new ZXing.BrowserMultiFormatReader();
            var result = reader.decodeFromCanvas(canvas);
            var parsed = _parseBarcode(result.getText());
            _isDecoding = false;
            btn.disabled = false;
            if(parsed && parsed.length >= 4){
                _onCodesFound([parsed]);
            } else {
                status.textContent = '코드를 찾지 못했습니다. 다시 시도해주세요.';
            }
        } catch(e){
            _isDecoding = false;
            btn.disabled = false;
            var msg = (e && e.name === 'NotFoundException')
                ? '바코드를 찾지 못했습니다. 더 가까이 대거나 흔들림 없이 시도해주세요.'
                : '인식 오류. 다시 시도해주세요.';
            status.textContent = msg;
        }
    });
}

function _loadZXing(cb){
    if(window.ZXing){ cb(); return; }
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js';
    s.onload = cb;
    s.onerror = function(){
        document.getElementById('scanStatus').textContent = '바코드 라이브러리 로드 실패. 네트워크를 확인해주세요.';
        _isDecoding = false;
        document.getElementById('scanCaptureBtn').disabled = false;
    };
    document.head.appendChild(s);
}

function _onCodesFound(codes){
    clearTimeout(_scanTimer);
    var unique = [];
    codes.forEach(function(c){ if(unique.indexOf(c) < 0) unique.push(c); });

    var codesEl = document.getElementById('scanResultCodes');
    codesEl.innerHTML = unique.map(function(c){
        var safe = c.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        return '<div class="scan-code-chip" onclick="selectCode(this,\'' + safe + '\')">' + safe + '</div>';
    }).join('');

    var area = document.getElementById('scanResultArea');
    area.style.display = 'flex';
    area.style.flexDirection = 'column';
    document.getElementById('scanSelectedArea').style.display = 'none';
    document.getElementById('scanStatus').textContent = unique.length + '개 코드 인식됨 ✓';

    /* 단일 결과면 자동 선택 */
    if(unique.length === 1){
        var chip = codesEl.querySelector('.scan-code-chip');
        if(chip) selectCode(chip, unique[0]);
    }
}

function selectCode(el, code){
    document.querySelectorAll('.scan-code-chip').forEach(function(c){ c.classList.remove('selected'); });
    el.classList.add('selected');
    _selectedCode = code;
    var sel = document.getElementById('scanSelectedArea');
    sel.style.display = 'flex';
    sel.style.flexDirection = 'column';
    document.getElementById('scanSelectedVal').textContent = code;
    document.getElementById('scanCopyBtn').textContent = '복사';
}

function viewInDashboard(){
    if(!_selectedCode) return;
    var th = document.documentElement.getAttribute('data-theme') || 'dark';
    var m = MENUS[_curMenu];
    var url = m.dashboard + '?shell=1&theme=' + th + '&scan=' + encodeURIComponent(_selectedCode);
    closeScan();
    _navigate(url);
}

function copySelectedCode(){
    if(!_selectedCode) return;
    var btn = document.getElementById('scanCopyBtn');
    if(navigator.clipboard){
        navigator.clipboard.writeText(_selectedCode).then(function(){
            btn.textContent = '복사됨 ✓';
            setTimeout(function(){ btn.textContent = '복사'; }, 1500);
        });
    } else {
        var el = document.createElement('textarea');
        el.value = _selectedCode; document.body.appendChild(el);
        el.select(); document.execCommand('copy'); document.body.removeChild(el);
        btn.textContent = '복사됨 ✓';
        setTimeout(function(){ btn.textContent = '복사'; }, 1500);
    }
}

function _stopScanStream(){
    clearTimeout(_scanTimer);
    if(_scanStream){ _scanStream.getTracks().forEach(function(t){t.stop();}); _scanStream = null; }
    _barcodeDetect = null;
}

function closeScan(){
    _stopScanStream();
    var v = document.getElementById('scanVideo');
    v.srcObject = null;
    document.getElementById('scanModal').classList.remove('open');
    document.getElementById('scanStatus').textContent = '카메라 준비 중...';
    document.getElementById('scanResultArea').style.display = 'none';
    document.getElementById('scanSelectedArea').style.display = 'none';
    document.getElementById('scanCaptureBtn').style.display = 'none';
    _selectedCode = '';
    _isDecoding = false;
}

function rescan(){
    document.getElementById('scanResultArea').style.display = 'none';
    document.getElementById('scanSelectedArea').style.display = 'none';
    _isDecoding = false;
    if('BarcodeDetector' in window && _scanStream){
        if(!_barcodeDetect){
            try { _barcodeDetect = new BarcodeDetector({ formats: ['code_128','code_39','ean_13','ean_8','upc_a','upc_e','itf','codabar','qr_code','data_matrix','aztec','pdf_417'] }); }
            catch(e) { _barcodeDetect = new BarcodeDetector(); }
        }
        document.getElementById('scanStatus').textContent = '바코드를 프레임에 비춰주세요 (자동 인식 중)';
        _loopBarcode(document.getElementById('scanVideo'));
    } else if(_scanStream) {
        document.getElementById('scanStatus').textContent = '바코드에 카메라를 맞추고 캡처 버튼을 누르세요';
        document.getElementById('scanCaptureBtn').style.display = 'block';
    } else {
        _startScan();
    }
}
</script>
