<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FURSYS 대시보드</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0B0F19">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FURSYS">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:     #0B0F19;
            --panel:  #111827;
            --border: #1E293B;
            --text:   #F1F5F9;
            --sub:    #94A3B8;
            --blue:   #00B0FF;
            --green:  #00E676;
            --dim:    #475569;
            --header-h: 54px;
            --nav-h:  60px;
        }
        :root[data-theme="light"] {
            --bg:     #EEF2F7;
            --panel:  #FFFFFF;
            --border: #CBD5E1;
            --text:   #0F172A;
            --sub:    #475569;
            --dim:    #94A3B8;
        }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            font-family: 'Inter', 'Noto Sans KR', system-ui, sans-serif;
            overflow: hidden;
        }

        /* ── Header ── */
        #appHeader {
            position: fixed; top: 0; left: 0; right: 0;
            height: calc(var(--header-h) + env(safe-area-inset-top, 0px));
            padding-top: env(safe-area-inset-top, 0px);
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding-left: 16px; padding-right: 16px;
            gap: 10px; z-index: 100;
        }
        .header-logo {
            width: 32px; height: 32px; border-radius: 10px;
            background: linear-gradient(135deg, var(--blue), var(--green));
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; font-weight: 800; color: #000; flex-shrink: 0;
        }
        .header-title {
            font-size: 16px; font-weight: 700; color: var(--text); flex: 1;
        }
        /* Theme toggle */
        #themeBtn {
            width: 38px; height: 22px; border-radius: 999px;
            background: var(--border); border: none; cursor: pointer;
            position: relative; transition: background .25s; flex-shrink: 0;
        }
        #themeBtn::after {
            content: ''; position: absolute;
            width: 16px; height: 16px; border-radius: 50%;
            background: var(--sub); top: 3px; left: 3px;
            transition: all .25s;
        }
        :root[data-theme="light"] #themeBtn { background: var(--blue); }
        :root[data-theme="light"] #themeBtn::after { left: 19px; background: #fff; }
        #themeIcon { font-size: 13px; }

        /* ── iFrame area ── */
        #frameWrap {
            position: fixed;
            top: calc(var(--header-h) + env(safe-area-inset-top, 0px));
            bottom: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
            left: 0; right: 0;
            overflow: hidden;
        }
        .app-frame {
            width: 100%; height: 100%;
            border: none;
            display: none;
            transition: opacity .2s;
        }
        .app-frame.active { display: block; }

        /* ── Bottom nav ── */
        #bottomNav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px));
            padding-bottom: env(safe-area-inset-bottom, 0px);
            background: var(--panel);
            border-top: 1px solid var(--border);
            display: flex; z-index: 100;
        }
        .nav-tab {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 4px; border: none; background: none;
            cursor: pointer; padding: 8px 4px;
            position: relative; transition: color .2s;
        }
        .nav-tab::before {
            content: ''; position: absolute; top: 0; left: 25%; right: 25%;
            height: 2px; border-radius: 0 0 2px 2px;
            background: transparent; transition: background .2s;
        }
        .nav-tab.active::before { background: var(--blue); }
        .nav-tab-icon {
            width: 36px; height: 28px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            transition: all .2s; background: transparent;
        }
        .nav-tab.active .nav-tab-icon { background: rgba(0,176,255,.12); }
        .nav-tab svg { transition: stroke .2s; }
        .nav-tab .nav-tab-svg { stroke: var(--dim); }
        .nav-tab.active .nav-tab-svg { stroke: var(--blue); }
        .nav-tab-label {
            font-size: 10px; font-weight: 600; color: var(--dim);
            transition: color .2s; letter-spacing: .01em;
        }
        .nav-tab.active .nav-tab-label { color: var(--blue); }

        /* Loading indicator */
        .frame-loading {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 12px;
            background: var(--bg); pointer-events: none;
            transition: opacity .3s;
        }
        .frame-loading.done { opacity: 0; }
        .spinner {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2.5px solid var(--border);
            border-top-color: var(--blue);
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 12px; color: var(--sub); font-weight: 500; }
    </style>
</head>
<body>

    <!-- Header -->
    <div id="appHeader">
        <div class="header-logo">F</div>
        <span class="header-title">FURSYS 대시보드</span>
        <span id="themeIcon">🌙</span>
        <button id="themeBtn" onclick="toggleTheme()" title="라이트/다크 전환"></button>
    </div>

    <!-- iframe 영역 -->
    <div id="frameWrap">
        <!-- 로딩 -->
        <div class="frame-loading" id="loadingOverlay">
            <div class="spinner"></div>
            <span class="loading-text">로딩 중...</span>
        </div>

        <!-- 포장강화 -->
        <iframe
            id="frame-pack"
            class="app-frame active"
            src="수출포장강화_대시보드.html"
            onload="onFrameLoad(this)">
        </iframe>

        <!-- 품질검사 -->
        <iframe
            id="frame-quality"
            class="app-frame"
            src=""
            data-src="수출검사리스트_대시보드.html"
            onload="onFrameLoad(this)">
        </iframe>
    </div>

    <!-- Bottom nav -->
    <div id="bottomNav">
        <button class="nav-tab active" id="tab-pack" onclick="switchTab('pack')">
            <div class="nav-tab-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-tab-svg">
                    <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
                </svg>
            </div>
            <span class="nav-tab-label">포장강화</span>
        </button>
        <button class="nav-tab" id="tab-quality" onclick="switchTab('quality')">
            <div class="nav-tab-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="nav-tab-svg">
                    <path d="M9 11l3 3L22 4"/>
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                </svg>
            </div>
            <span class="nav-tab-label">품질검사</span>
        </button>
    </div>

    <script>
        let currentTab = 'pack';
        let qualityLoaded = false;

        function switchTab(tab) {
            if (currentTab === tab) return;
            currentTab = tab;

            // 탭 상태 업데이트
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');

            // iframe 전환
            document.querySelectorAll('.app-frame').forEach(f => f.classList.remove('active'));
            const frame = document.getElementById('frame-' + tab);
            frame.classList.add('active');

            // 품질검사 처음 열 때 lazy load
            if (tab === 'quality' && !qualityLoaded) {
                qualityLoaded = true;
                document.getElementById('loadingOverlay').classList.remove('done');
                frame.src = frame.dataset.src;
            }
        }

        function onFrameLoad(frame) {
            document.getElementById('loadingOverlay').classList.add('done');
            // 테마 동기화 전달
            try {
                const theme = document.documentElement.getAttribute('data-theme') || 'dark';
                frame.contentWindow.postMessage({ type: 'setTheme', theme }, '*');
            } catch(e) {}
        }

        function toggleTheme() {
            const root = document.documentElement;
            const isLight = root.getAttribute('data-theme') === 'light';
            const next = isLight ? 'dark' : 'light';
            root.setAttribute('data-theme', next);
            document.getElementById('themeIcon').textContent = next === 'light' ? '☀️' : '🌙';
            // 각 iframe에 테마 전달
            ['frame-pack', 'frame-quality'].forEach(id => {
                try {
                    document.getElementById(id).contentWindow.postMessage({ type: 'setTheme', theme: next }, '*');
                } catch(e) {}
            });
        }

        // iframe에서 테마 메시지 수신 처리 (각 대시보드에서 지원 시)
        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'themeChange') {
                document.documentElement.setAttribute('data-theme', e.data.theme);
            }
        });
    </script>
</body>
</html>
